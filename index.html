<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voice Navigation App</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f4f4f4;
    }

    header {
        background: #333;
        color: white;
        padding: 15px;
        text-align: center;
    }

    .container {
        padding: 20px;
    }

    .menu, .submenu, .content {
        display: none;
    }

    .active {
        display: block;
    }

    .button {
        display: block;
        background: #007BFF;
        color: white;
        padding: 12px;
        margin: 10px 0;
        text-align: center;
        cursor: pointer;
        border-radius: 5px;
    }

    .button:hover {
        background: #0056b3;
    }

    .back {
        background: #6c757d;
    }

    img {
        max-width: 100%;
        margin-top: 10px;
        border-radius: 5px;
    }
</style>
</head>
<body>

<header>
    <h1>Voice Navigation App</h1>
</header>

<div class="container">

    <!-- MAIN MENU -->
    <div id="mainMenu" class="menu active"></div>

    <!-- SUB MENU -->
    <div id="subMenu" class="submenu"></div>

    <!-- CONTENT PAGE -->
    <div id="contentPage" class="content"></div>

</div>

<script>
// -------- DATA STRUCTURE --------
const data = {
    "Voice 1": [
        { title: "Item 1", text: "Content for Item 1", img: "https://via.placeholder.com/400" },
        { title: "Item 2", text: "Content for Item 2", img: "https://via.placeholder.com/400" }
    ],
    "Voice 2": [
        { title: "Item A", text: "Content A", img: "https://via.placeholder.com/400" }
    ],
    "Voice 3": [],
    "Voice 4": [],
    "Voice 5": [],
    "Voice 6": [],
    "Voice 7": [],
    "Voice 8": [],
    "Voice 9": [],
    "Voice 10": [],
    "Voice 11": []
};

// -------- ELEMENTS --------
const mainMenu = document.getElementById("mainMenu");
const subMenu = document.getElementById("subMenu");
const contentPage = document.getElementById("contentPage");

// -------- BUILD MAIN MENU --------
function loadMainMenu() {
    mainMenu.innerHTML = "<h2>Main Menu</h2>";

    Object.keys(data).forEach(voice => {
        const btn = document.createElement("div");
        btn.className = "button";
        btn.innerText = voice;
        btn.onclick = () => openSubMenu(voice);
        mainMenu.appendChild(btn);
    });
}

// -------- OPEN SUB MENU --------
function openSubMenu(voice) {
    mainMenu.classList.remove("active");
    subMenu.classList.add("active");

    subMenu.innerHTML = `<h2>${voice}</h2>`;

    if (data[voice].length === 0) {
        subMenu.innerHTML += "<p>No items yet.</p>";
    }

    data[voice].forEach(item => {
        const btn = document.createElement("div");
        btn.className = "button";
        btn.innerText = item.title;
        btn.onclick = () => openContent(item);
        subMenu.appendChild(btn);
    });

    const back = document.createElement("div");
    back.className = "button back";
    back.innerText = "Back";
    back.onclick = () => {
        subMenu.classList.remove("active");
        mainMenu.classList.add("active");
    };

    subMenu.appendChild(back);
}

// -------- OPEN CONTENT PAGE --------
function openContent(item) {
    subMenu.classList.remove("active");
    contentPage.classList.add("active");

    contentPage.innerHTML = `
        <h2>${item.title}</h2>
        <p>${item.text}</p>
        <img src="${item.img}" alt="">
    `;

    const back = document.createElement("div");
    back.className = "button back";
    back.innerText = "Back";
    back.onclick = () => {
        contentPage.classList.remove("active");
        subMenu.classList.add("active");
    };

    contentPage.appendChild(back);
}

// -------- INIT --------
loadMainMenu();
</script>

</body>
</html>
