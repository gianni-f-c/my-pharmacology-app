<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pirate Logbook</title>

<style>
    body {
        margin: 0;
        font-family: "Trebuchet MS", sans-serif;
        background: linear-gradient(to bottom, #0c1b2a, #1f3b4d);
        color: #f5e6c8;
    }

    header {
        text-align: center;
        padding: 20px;
        font-size: 28px;
        letter-spacing: 2px;
        color: #f8d27a;
    }

    .container {
        padding: 20px;
        max-width: 600px;
        margin: auto;
    }

    .menu, .submenu, .content {
        display: none;
    }

    .active {
        display: block;
    }

    /* Rounded "map buttons" */
    .button {
        background: rgba(255, 223, 150, 0.08);
        border: 1px solid rgba(255, 223, 150, 0.2);
        padding: 14px;
        margin: 12px 0;
        border-radius: 40px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s ease;
        backdrop-filter: blur(4px);
    }

    .button:hover {
        background: rgba(255, 223, 150, 0.2);
        transform: scale(1.03);
    }

    .back {
        background: rgba(255,255,255,0.05);
    }

    h2 {
        text-align: center;
        font-weight: normal;
        margin-bottom: 20px;
        color: #ffd98e;
    }

    p {
        line-height: 1.6;
        text-align: center;
    }

    img {
        width: 100%;
        border-radius: 20px;
        margin-top: 15px;
        opacity: 0.95;
    }

    /* subtle wave divider */
    .wave {
        height: 20px;
        margin: 20px 0;
        background: radial-gradient(circle at 50% -10px, #f8d27a 20%, transparent 21%);
        background-size: 40px 20px;
        opacity: 0.3;
    }
</style>
</head>

<body>

<header>☠ Pirate Logbook ☠</header>

<div class="container">

    <div id="mainMenu" class="menu active"></div>
    <div id="subMenu" class="submenu"></div>
    <div id="contentPage" class="content"></div>

</div>

<script>
const data = {
    "East Blue": [
        {
            title: "Foosha Village",
            text: "Where the journey begins...",
            img: "https://via.placeholder.com/500x300"
        },
        {
            title: "Shells Town",
            text: "A marine-controlled island.",
            img: "https://via.placeholder.com/500x300"
        }
    ],
    "Grand Line": [
        {
            title: "Alabasta",
            text: "A desert kingdom in turmoil.",
            img: "https://via.placeholder.com/500x300"
        }
    ],
    "New World": [],
    "Crew": [],
    "Ships": [],
    "Treasures": [],
    "Enemies": [],
    "Allies": [],
    "Islands": [],
    "Battles": [],
    "Mysteries": []
};

const mainMenu = document.getElementById("mainMenu");
const subMenu = document.getElementById("subMenu");
const contentPage = document.getElementById("contentPage");

function loadMainMenu() {
    mainMenu.innerHTML = "<h2>Choose Your Route</h2><div class='wave'></div>";

    Object.keys(data).forEach(voice => {
        const btn = document.createElement("div");
        btn.className = "button";
        btn.innerText = voice;
        btn.onclick = () => openSubMenu(voice);
        mainMenu.appendChild(btn);
    });
}

function openSubMenu(voice) {
    mainMenu.classList.remove("active");
    subMenu.classList.add("active");

    subMenu.innerHTML = `<h2>${voice}</h2><div class='wave'></div>`;

    if (data[voice].length === 0) {
        subMenu.innerHTML += "<p>Nothing charted here yet...</p>";
    }

    data[voice].forEach(item => {
        const btn = document.createElement("div");
        btn.className = "button";
        btn.innerText = item.title;
        btn.onclick = () => openContent(item);
        subMenu.appendChild(btn);
    });

    addBackButton(subMenu, mainMenu);
}

function openContent(item) {
    subMenu.classList.remove("active");
    contentPage.classList.add("active");

    contentPage.innerHTML = `
        <h2>${item.title}</h2>
        <div class='wave'></div>
        <p>${item.text}</p>
        <img src="${item.img}">
    `;

    addBackButton(contentPage, subMenu);
}

function addBackButton(current, target) {
    const back = document.createElement("div");
    back.className = "button back";
    back.innerText = "← Back";
    back.onclick = () => {
        current.classList.remove("active");
        target.classList.add("active");
    };
    current.appendChild(back);
}

loadMainMenu();
</script>

</body>
</html>
